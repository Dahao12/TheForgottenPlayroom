<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Forgotten Playroom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            background: #0a0008;
            font-family: Arial, sans-serif;
            color: #fff;
            touch-action: none;
        }
        
        /* MENÚ */
        #menu {
            position: fixed; inset: 0;
            background: linear-gradient(180deg, #0a0005 0%, #1a0a15 50%, #0a0005 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }
        #menu.hidden { display: none; }
        
        .title {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #ff2244;
            text-shadow: 0 0 20px #ff0022;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .subtitle { color: #666; margin-bottom: 40px; text-align: center; padding: 0 20px; }
        
        .btn {
            padding: 20px 50px;
            margin: 10px;
            background: linear-gradient(180deg, #2a1525, #1a0a15);
            border: 2px solid #ff2244;
            color: #fff;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            min-width: 220px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn:active { background: #ff2244; transform: scale(0.95); }
        
        /* JUEGO */
        #game { display: none; }
        #game.active { display: block; }
        
        canvas { width: 100%; height: 100vh; display: block; touch-action: none; }
        
        /* HUD */
        #hud {
            position: fixed; top: 10px; left: 10px;
            display: flex; flex-direction: column; gap: 5px;
            z-index: 10; pointer-events: none;
        }
        .stat {
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.8);
            padding: 8px 12px; border-radius: 4px;
        }
        .bar { width: 100px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        #healthBar .bar-fill { background: linear-gradient(90deg, #ff2244, #ff6688); }
        #staminaBar .bar-fill { background: linear-gradient(90deg, #22aaff, #66ccff); }
        #lightBar .bar-fill { background: linear-gradient(90deg, #ffaa22, #ffcc66); }
        
        /* CONTROLES MÓVIL */
        #controls {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            display: none; z-index: 100;
            pointer-events: none;
        }
        #controls.active { display: flex; justify-content: space-between; align-items: flex-end; }
        
        #joystick {
            width: 120px; height: 120px;
            background: rgba(0,0,0,0.6);
            border: 3px solid rgba(255,34,68,0.5);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
        }
        #joystick-knob {
            width: 50px; height: 50px;
            background: linear-gradient(180deg, #ff2244, #aa0022);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #buttons { display: flex; gap: 10px; pointer-events: auto; }
        .game-btn {
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff2244;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .game-btn:active { background: #ff2244; }
        #btnGrab { border-color: #22aaff; }
        #btnGrab:active { background: #22aaff; }
        
        /* COUNTDOWN */
        #countdown {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 175;
        }
        #countdown.active { display: flex; }
        #countdown h1 {
            font-size: 8rem;
            color: #ff2244;
            text-shadow: 0 0 50px #ff0022;
            animation: pulse 0.5s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1.2; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* OVERLAYS */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .overlay.active { display: flex; }
        .overlay h1 { color: #ff2244; font-size: 2rem; margin-bottom: 20px; }
        .overlay p { color: #888; margin-bottom: 20px; text-align: center; }
        
        #chapterScreen {
            position: fixed; inset: 0;
            background: #000;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 150;
        }
        #chapterScreen.active { display: flex; }
        #chapterScreen h1 { color: #ff2244; font-size: 2.5rem; }
        #chapterScreen h2 { color: #888; font-size: 1.5rem; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- MENÚ -->
    <div id="menu">
        <h1 class="title">THE FORGOTTEN<br>PLAYROOM</h1>
        <p class="subtitle">Una fábrica abandonada... juguetes olvidados... terror</p>
        <button class="btn" id="playBtn">▶ JUGAR</button>
        <p style="color:#ff2244; margin-top:30px; font-size:0.8rem;">⚠️ Terror psicológico - Mayores de 12</p>
    </div>
    
    <!-- JUEGO -->
    <div id="game">
        <canvas id="canvas"></canvas>
        <div id="hud">
            <div class="stat"><span>❤️</span><div class="bar" id="healthBar"><div class="bar-fill" id="healthFill"></div></div></div>
            <div class="stat"><span>⚡</span><div class="bar" id="staminaBar"><div class="bar-fill" id="staminaFill"></div></div></div>
            <div class="stat"><span>🔦</span><div class="bar" id="lightBar"><div class="bar-fill" id="lightFill"></div></div></div>
        </div>
        <div id="controls">
            <div id="joystick"><div id="joystick-knob"></div></div>
            <div id="buttons">
                <button class="game-btn" id="btnRun">▶</button>
                <button class="game-btn" id="btnGrab">🔌</button>
            </div>
        </div>
    </div>
    
    <!-- COUNTDOWN -->
    <div id="countdown">
        <h1 id="countdownNum">3</h1>
    </div>
    
    <!-- CHAPTER SCREEN -->
    <div id="chapterScreen">
        <h1 id="chapTitle">CAPÍTULO 1</h1>
        <h2 id="chapSub">La Entrada</h2>
        <p style="color:#666; margin-top:30px;">Toca para comenzar</p>
    </div>
    
    <!-- GAME OVER -->
    <div id="gameOver" class="overlay">
        <h1>GAME OVER</h1>
        <p id="deathMsg">Te atraparon...</p>
        <button class="btn" id="retryBtn">🔄 REINTENTAR</button>
        <button class="btn" id="menuBtn">🏠 MENÚ</button>
    </div>
    
    <!-- VICTORY -->
    <div id="victory" class="overlay">
        <h1 style="color:#22ff66;">¡ESCAPASTE!</h1>
        <p>Sobreviviste a The Forgotten Playroom</p>
        <button class="btn" id="playAgainBtn">🔄 JUGAR DE NUEVO</button>
        <button class="btn" id="menuBtn2">🏠 MENÚ</button>
    </div>

    <script>
    // ========================================
    // THE FORGOTTEN PLAYROOM - EASY MODE
    // ========================================
    
    // Estado del juego - INICIALIZADO PRIMERO
    const state = {
        screen: 'menu',
        chapter: 1,
        player: { x: 0, y: 0, hp: 100, stamina: 100, light: 100 },
        enemies: [],
        exit: { x: 0, y: 0 },
        countdownActive: false
    };
    
    // Referencias DOM
    let canvas, ctx, W, H;
    let joystickData = { x: 0, y: 0, active: false };
    let running = false;
    let frame = 0;
    
    // Constantes
    const IS_MOBILE = 'ontouchstart' in window || navigator.userAgent.includes('Mobile');
    const CHAPTERS = ['La Entrada', 'El Almacén', 'El Laboratorio', 'La Sala de Emily'];
    
    // CONFIGURACIÓN DE DIFICULTAD
    const DIFFICULTY = {
        enemySpeed: 0.5,           // Velocidad base (era 1)
        speedPerChapter: 0.1,      // Incremento por capítulo (era 0.2)
        minSpawnDistance: 300,      // Distancia mínima del jugador
        collisionRadius: 50,        // Radio de colisión (era 30)
        damagePerHit: 2,            // Daño por frame (era 5)
        lightRadius: 300,           // Radio de luz (era 200)
        playerSpeed: 4,             // Velocidad caminando
        playerSprint: 7             // Velocidad corriendo
    };
    
    // ========================================
    // INICIALIZACIÓN
    // ========================================
    
    function init() {
        console.log('🎮 Iniciando juego (Easy Mode)...');
        
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        resize();
        window.addEventListener('resize', resize);
        
        // Botones del menú
        document.getElementById('playBtn').addEventListener('click', startGame);
        document.getElementById('playBtn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
        
        // Botones del juego
        document.getElementById('retryBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', goToMenu);
        document.getElementById('playAgainBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn2').addEventListener('click', goToMenu);
        
        // Controles móviles
        if (IS_MOBILE) {
            setupMobileControls();
        }
        
        // Chapter screen tap
        document.getElementById('chapterScreen').addEventListener('click', hideChapter);
        document.getElementById('chapterScreen').addEventListener('touchend', function(e) { e.preventDefault(); hideChapter(); });
        
        // Keyboard
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Escape' && state.screen === 'playing') {
                goToMenu();
            }
        });
        
        console.log('✅ Juego listo - Easy Mode activado');
        
        // Iniciar game loop
        requestAnimationFrame(gameLoop);
    }
    
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    
    // ========================================
    // CONTROLES MÓVILES
    // ========================================
    
    function setupMobileControls() {
        const joystick = document.getElementById('joystick');
        const knob = document.getElementById('joystick-knob');
        const btnRun = document.getElementById('btnRun');
        const btnGrab = document.getElementById('btnGrab');
        
        // Joystick
        joystick.addEventListener('touchstart', function(e) {
            e.preventDefault();
            joystickData.active = true;
            handleJoystick(e.touches[0]);
        });
        
        joystick.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (joystickData.active) handleJoystick(e.touches[0]);
        });
        
        joystick.addEventListener('touchend', function(e) {
            e.preventDefault();
            joystickData.active = false;
            joystickData.x = 0;
            joystickData.y = 0;
            knob.style.transform = 'translate(-50%, -50%)';
        });
        
        function handleJoystick(touch) {
            const rect = joystick.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const maxDist = rect.width / 2 - 25;
            
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > maxDist) {
                dx = dx / dist * maxDist;
                dy = dy / dist * maxDist;
            }
            
            joystickData.x = dx / maxDist;
            joystickData.y = dy / maxDist;
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }
        
        // Botón correr
        btnRun.addEventListener('touchstart', function(e) { e.preventDefault(); running = true; });
        btnRun.addEventListener('touchend', function(e) { e.preventDefault(); running = false; });
        
        // Botón grabpack
        btnGrab.addEventListener('touchstart', function(e) { e.preventDefault(); useGrabPack(); });
    }
    
    function useGrabPack() {
        console.log('🔌 GrabPack usado');
    }
    
    // ========================================
    // CAMBIOS DE PANTALLA
    // ========================================
    
    function startGame() {
        console.log('▶ Iniciando partida...');
        
        // Forzar ocultar TODOS los overlays
        document.getElementById('chapterScreen').classList.remove('active');
        document.getElementById('gameOver').classList.remove('active');
        document.getElementById('victory').classList.remove('active');
        document.getElementById('countdown').classList.remove('active');
        
        state.screen = 'playing';
        state.chapter = 1;
        state.player = { x: W/2, y: H/2, hp: 100, stamina: 100, light: 100 };
        state.enemies = [];
        state.exit = { x: W - 80, y: H - 80 };
        
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.add('active');
        document.getElementById('gameOver').classList.remove('active');
        document.getElementById('victory').classList.remove('active');
        
        if (IS_MOBILE) {
            document.getElementById('controls').classList.add('active');
        }
        
        spawnEnemies();
        showChapter();
        
        console.log('✅ Partida iniciada');
    }
    
    function goToMenu() {
        state.screen = 'menu';
        state.countdownActive = false;
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game').classList.remove('active');
        document.getElementById('gameOver').classList.remove('active');
        document.getElementById('victory').classList.remove('active');
        document.getElementById('controls').classList.remove('active');
        document.getElementById('countdown').classList.remove('active');
    }
    
    function showChapter() {
        document.getElementById('chapTitle').textContent = 'CAPÍTULO ' + state.chapter;
        document.getElementById('chapSub').textContent = CHAPTERS[state.chapter - 1] || 'Final';
        document.getElementById('chapterScreen').classList.add('active');
    }
    
    function hideChapter() {
        document.getElementById('chapterScreen').classList.remove('active');
        startCountdown();
    }
    
    function startCountdown() {
        state.countdownActive = true;
        const countdownEl = document.getElementById('countdown');
        const numEl = document.getElementById('countdownNum');
        countdownEl.classList.add('active');
        
        let count = 3;
        numEl.textContent = count;
        
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                numEl.textContent = count;
            } else {
                clearInterval(interval);
                countdownEl.classList.remove('active');
                state.countdownActive = false;
            }
        }, 800);
    }
    
    function gameOver(msg) {
        state.screen = 'gameover';
        document.getElementById('deathMsg').textContent = msg || 'Te atraparon...';
        document.getElementById('gameOver').classList.add('active');
    }
    
    function victory() {
        state.screen = 'victory';
        document.getElementById('victory').classList.add('active');
    }
    
    // ========================================
    // LÓGICA DEL JUEGO
    // ========================================
    
    function spawnEnemies() {
        state.enemies = [];
        const count = Math.min(state.chapter + 1, 5);
        const types = ['boogo', 'catstar', 'robot', 'rat', 'slime'];
        
        for (let i = 0; i < count; i++) {
            let x, y;
            let attempts = 0;
            
            // Spawnear LEJOS del jugador
            do {
                x = Math.random() * (W - 100) + 50;
                y = Math.random() * (H - 100) + 50;
                attempts++;
            } while (
                Math.sqrt(Math.pow(x - state.player.x, 2) + Math.pow(y - state.player.y, 2)) < DIFFICULTY.minSpawnDistance
                && attempts < 50
            );
            
            state.enemies.push({
                x: x,
                y: y,
                type: types[i % types.length],
                speed: DIFFICULTY.enemySpeed + state.chapter * DIFFICULTY.speedPerChapter
            });
        }
    }
    
    function update() {
        if (state.screen !== 'playing' || state.countdownActive) return;
        
        frame++;
        
        // Movimiento del jugador
        let dx = 0, dy = 0;
        
        // Joystick móvil
        if (IS_MOBILE && joystickData.active) {
            dx = joystickData.x;
            dy = joystickData.y;
        }
        
        // Teclado
        if (keyState['KeyW'] || keyState['ArrowUp']) dy -= 1;
        if (keyState['KeyS'] || keyState['ArrowDown']) dy += 1;
        if (keyState['KeyA'] || keyState['ArrowLeft']) dx -= 1;
        if (keyState['KeyD'] || keyState['ArrowRight']) dx += 1;
        
        const mag = Math.sqrt(dx*dx + dy*dy);
        if (mag > 0) { dx /= mag; dy /= mag; }
        
        const speed = running ? DIFFICULTY.playerSprint : DIFFICULTY.playerSpeed;
        state.player.x = Math.max(20, Math.min(W - 20, state.player.x + dx * speed));
        state.player.y = Math.max(20, Math.min(H - 20, state.player.y + dy * speed));
        
        // Stamina
        if (running && (dx !== 0 || dy !== 0)) {
            state.player.stamina = Math.max(0, state.player.stamina - 0.5);
            if (state.player.stamina === 0) running = false;
        } else {
            state.player.stamina = Math.min(100, state.player.stamina + 0.3);
        }
        
        // Luz
        state.player.light = Math.max(0, state.player.light - 0.01);
        
        // Enemigos
        state.enemies.forEach(e => {
            const dist = Math.sqrt(Math.pow(state.player.x - e.x, 2) + Math.pow(state.player.y - e.y, 2));
            
            // Solo perseguir si está en el radio de luz Y la luz es suficiente
            if (dist < DIFFICULTY.lightRadius * (state.player.light / 100) && state.player.light > 10) {
                const angle = Math.atan2(state.player.y - e.y, state.player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;
            } else {
                // Patrullar aleatoriamente
                e.x += Math.cos(frame * 0.02 + e.speed) * 0.5;
                e.y += Math.sin(frame * 0.02 + e.speed) * 0.5;
            }
            
            // Colisión - solo si está MUY cerca
            if (dist < DIFFICULTY.collisionRadius && state.player.hp > 0) {
                state.player.hp -= DIFFICULTY.damagePerHit;
                if (state.player.hp <= 0) {
                    gameOver('¡Un enemigo te atrapó!');
                }
            }
        });
        
        // Meta
        const exitDist = Math.sqrt(Math.pow(state.player.x - state.exit.x, 2) + Math.pow(state.player.y - state.exit.y, 2));
        if (exitDist < 40) {
            state.chapter++;
            if (state.chapter > 4) {
                victory();
            } else {
                state.player.x = W / 2;
                state.player.y = H / 2;
                state.player.hp = Math.min(100, state.player.hp + 25);
                state.player.light = 100;
                spawnEnemies();
                showChapter();
            }
        }
        
        // Actualizar HUD
        document.getElementById('healthFill').style.width = state.player.hp + '%';
        document.getElementById('staminaFill').style.width = state.player.stamina + '%';
        document.getElementById('lightFill').style.width = state.player.light + '%';
    }
    
    // Estado del teclado
    const keyState = {};
    window.addEventListener('keydown', e => keyState[e.code] = true);
    window.addEventListener('keyup', e => keyState[e.code] = false);
    
    function draw() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);
        
        if (state.screen !== 'playing') return;
        
        // Grid del suelo - más visible
        ctx.strokeStyle = '#2a2a4e';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 50) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        for (let y = 0; y < H; y += 50) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
        
        // Meta (salida)
        ctx.beginPath();
        ctx.arc(state.exit.x, state.exit.y, 40, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 255, 100, 0.3)';
        ctx.fill();
        ctx.strokeStyle = '#00ff66';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#00ff66';
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🚪', state.exit.x, state.exit.y + 7);
        
        // Radio de luz dinámico
        const lightRadius = DIFFICULTY.lightRadius * (state.player.light / 100);
        
        // Enemigos - SIEMPRE visibles
        state.enemies.forEach(e => {
            const dist = Math.sqrt(Math.pow(state.player.x - e.x, 2) + Math.pow(state.player.y - e.y, 2));
            
            // Cuerpo del enemigo - colores MÁS BRILLANTES
            ctx.beginPath();
            ctx.arc(e.x, e.y, 22, 0, Math.PI * 2);
            ctx.fillStyle = e.type === 'boogo' ? '#00aaff' : 
                             e.type === 'catstar' ? '#ff8800' : 
                             e.type === 'robot' ? '#aaa' : 
                             e.type === 'rat' ? '#c88040' : '#00ff00';
            ctx.fill();
            
            // Borde brillante para visibilidad
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Ojos GLOW
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(e.x - 7, e.y - 5, 6, 0, Math.PI * 2);
            ctx.arc(e.x + 7, e.y - 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(e.x - 7, e.y - 5, 3, 0, Math.PI * 2);
            ctx.arc(e.x + 7, e.y - 5, 3, 0, Math.PI * 2);
            ctx.fill();
        });
        
        // Jugador - MUY visible
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y, 18, 0, Math.PI * 2);
        ctx.fillStyle = '#ffee00';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        // Linterna (círculo de luz)
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        const gradient = ctx.createRadialGradient(
            state.player.x, state.player.y, 0, 
            state.player.x, state.player.y, lightRadius
        );
        gradient.addColorStop(0, 'rgba(0,0,0,1)');
        gradient.addColorStop(0.7, 'rgba(0,0,0,0.8)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y, lightRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // Iniciar cuando cargue
    window.addEventListener('load', init);
    </script>
</body>
</html>
